server {
    listen 80;
    server_name 192.168.1.77 ai.emex.local _;

    client_max_body_size 200m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # Open WebUI корректнее работает из корня сайта, а не из подкаталога.
    location / {
        proxy_pass http://open-webui:8080;
    }

    location = /ai/webui {
        return 301 /;
    }

    location /ai/webui/ {
        return 301 /;
    }

    # Open WebUI отдает часть ресурсов и API абсолютными путями.
    location /static/ {
        proxy_pass http://open-webui:8080;
    }

    location /assets/ {
        proxy_pass http://open-webui:8080;
    }

    location /api/ {
        proxy_pass http://open-webui:8080;
    }
}

server {
    listen 8089;
    server_name 192.168.1.77 ai.emex.local _;

    client_max_body_size 200m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # AnythingLLM также корректнее работает из корня отдельного порта.
    location / {
        proxy_pass http://anythingllm:3001;
    }
}
