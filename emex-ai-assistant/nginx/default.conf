server {
    listen 80;
    server_name ai.emex.local _;

    client_max_body_size 200m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    location = / {
        return 302 /ai/webui/;
    }

    location = /ai/anythingllm {
        return 301 /ai/anythingllm/;
    }

    location /ai/anythingllm/ {
        rewrite ^/ai/anythingllm/(.*)$ /$1 break;
        proxy_pass http://anythingllm:3001;
    }

    location = /ai/webui {
        return 301 /ai/webui/;
    }

    location /ai/webui/ {
        rewrite ^/ai/webui/(.*)$ /$1 break;
        proxy_pass http://open-webui:8080;
    }

    # Некоторые интерфейсы отдают статические файлы с абсолютных путей.
    # Эти маршруты нужны, чтобы UI корректно открывался через /ai/webui/.
    location /static/ {
        proxy_pass http://open-webui:8080;
    }

    location /assets/ {
        proxy_pass http://open-webui:8080;
    }

    location /api/ {
        proxy_pass http://open-webui:8080;
    }
}
