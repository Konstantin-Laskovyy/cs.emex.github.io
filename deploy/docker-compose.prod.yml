services:
  nginx:
    image: nginx:1.27-alpine
    container_name: intranet_nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - intranet_net

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
    container_name: intranet_frontend
    restart: unless-stopped
    networks:
      - intranet_net

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: intranet_backend
    env_file:
      - ../backend/.env
    volumes:
      - /srv/social/uploads:/app/uploads
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - intranet_net

  postgres:
    image: postgres:16-alpine
    container_name: intranet_postgres
    env_file:
      - ../.env
    volumes:
      - /srv/social/postgres/data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - intranet_net

networks:
  intranet_net:
    driver: bridge
